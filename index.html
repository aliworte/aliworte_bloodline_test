      `})]})}const R0=["elf","beast","mer","ghost","dwarf","human"],mf={elf:{name:"阿莎娜",display:"精灵"},beast:{name:"玛瑞维",display:"兽人"},mer:{name:"蒙佩洛",display:"人鱼"},ghost:{name:"迪门特",display:"魔族"},dwarf:{name:"多瑞斯",display:"矮人"},human:{name:"伊亚迪克",display:"人类"}},Le={elf:"#6B9BD1",beast:"#D98C3F",mer:"#5BA8A0",ghost:"#8B6DB1",dwarf:"#A0785A",human:"#888888"},bh=[{id:1,text:"整理旧相册，发现自己最常拍的一类照片是",options:[{race:"elf",text:'天空、晚霞、高处俯瞰的街景，以及"这张构图很有自由的感觉"的废片'},{race:"beast",text:"和朋友的合照，尤其是损友的丑照重点收藏"},{race:"mer",text:'家族聚餐大合照、老照片翻拍、或者"这个场景好像我奶奶说的那个故事"'},{race:"ghost",text:"精心布置的书桌一角、阳台植物、或者只有自己觉得好看的光影，基本不拍人"}]},{id:2,text:"逛超市时，你最容易被什么打动而买单",options:[{race:"elf",text:'包装好看的新口味气泡水，或者"限定款"三个字，哪怕家里还有三瓶'},{race:"beast",text:'在零食区和生鲜区之间来回走了三趟，最后买了计划外的所有东西，因为"看起来都好吃"'},{race:"mer",text:'奶奶/妈妈常用的那个老牌子，虽然旁边新品在促销，但"这个我知根知底"'},{race:"dwarf",text:"为了某个特定菜谱精确采购，清单上的东西必须买齐，少一样就浑身难受"}]},{id:3,text:"你最喜欢哪种周末打开方式",options:[{race:"elf",text:"早起去城市最高点看日出，然后随机探索一条没走过的小巷"},{race:"beast",text:"约好了朋友一起出去玩，顺利汇合但随便找了个舒服的地方一起刷手机结束了一天"},{race:"mer",text:"按惯例周六大扫除、周日家庭聚餐，规律让人安心"},{race:"human",text:"睡到自然醒，看心情决定今天干嘛，可能躺一天也可能突然出门"}]},{id:4,text:"你要布置自己的房间，最看重什么",options:[{race:"elf",text:"开阔的视野和良好的采光，最好有能看天空的窗户，植物要放在高处"},{race:"beast",text:"看到别人的好物/风格推荐就想要同款，最后变成了超级混搭风"},{race:"ghost",text:"隐私感第一，遮光窗帘、隔音棉、香薰，打造一个外人进不来的结界"},{race:"dwarf",text:"功能性优先，每个区域有明确用途，书桌就是书桌，床就是床，不混搭"}]},{id:5,text:"你最喜欢什么类型的电影/剧集",options:[{race:"elf",text:"公路片、冒险片，主角一直在路上，风景绝美，结局开放"},{race:"beast",text:"看正剧不看，但各种电影、电视剧解说一个不落"},{race:"ghost",text:"一个人看的文艺片或悬疑片，不需要和人讨论，看完自己消化"},{race:"human",text:"什么类型都看，最近流行什么看什么，不挑"}]},{id:6,text:"朋友约你吃一家很火但排队两小时的网红餐厅",options:[{race:"elf",text:"查好非高峰时段，规划好周边可以逛的店，把排队变成城市探索"},{race:"beast",text:"能点他家外卖的话就不出去受罪了"},{race:"dwarf",text:"提前拿号，排队期间背单词/看书，绝不浪费时间，吃完写详细评价"},{race:"human",text:"走到哪吃到哪，看到什么吃什么，网红店？随缘吧"}]},{id:7,text:"如果要养宠物，你最可能选择",options:[{race:"elf",text:"养鸟，或者能高处活动的宠物，每天看着它飞觉得心情开阔"},{race:"mer",text:"养金鱼/乌龟，安静好打理"},{race:"ghost",text:"养猫，独立不粘人，不需要遛，各自有空间，偶尔互相陪伴"},{race:"dwarf",text:"养狗，每天固定时间遛，训练指令，五年如一日，这就是我们之间的羁绊啊布鲁斯！"}]},{id:8,text:"你发朋友圈/社交动态的频率是",options:[{race:"elf",text:"不定期，但每条都是精心构图的风景或感悟，像个人杂志"},{race:"mer",text:"节假日和家族纪念日必发，内容固定，长辈看了都点赞"},{race:"ghost",text:"几乎不发，偶尔发也是仅自己可见，或者三天可见"},{race:"human",text:"想到什么发什么，上周的梗这周还在发，但自己很开心"}]},{id:9,text:"排队时前面有人吵架，你会",options:[{race:"elf",text:"竖起耳朵吃瓜，但保持安全距离，随时准备撤离"},{race:"mer",text:'想起"闲事少管"，低头玩手机，怕波及自己'},{race:"dwarf",text:"如果影响队伍前进就出面调解，快速解决问题，恢复秩序"},{race:"human",text:"看热闹，或者走开，取决于当时有没有急事"}]},{id:10,text:"你喝咖啡/茶的习惯是",options:[{race:"elf",text:"喜欢尝试各种特调、手冲、产地豆，像品酒一样研究风味"},{race:"ghost",text:"固定喝一种，每天同一时段，同一杯子，不接受新品推荐"},{race:"dwarf",text:"为了提神而喝，不追求口感"},{race:"human",text:"奶茶也行咖啡也行白开水也行，渴了喝啥都行"}]},{id:11,text:"团队作业/项目里，你通常扮演什么角色",options:[{race:"beast",text:"粘合剂，能照顾到每个人的情绪，但自己不愿意去当担责的负责人"},{race:"mer",text:"顾问，提供经验参考，提醒团队别踩坑，但不主动出头"},{race:"ghost",text:"独立执行者，领到自己的任务就闷头做，少开会少讨论"},{race:"dwarf",text:"推进者，制定时间节点，催进度，确保项目按时交付"}]},{id:12,text:"朋友深夜打电话倾诉感情问题",options:[{race:"beast",text:"陪他聊到凌晨五点，既安慰他又帮他分析，最后自己失眠了"},{race:"mer",text:'先听，然后分享"我当年也遇到过类似的事，后来……"'},{race:"ghost",text:'设定一个时间界限，比如"我陪你聊半小时"，到点就挂'},{race:"human",text:'听着，偶尔附和，最后说"别想太多，睡吧"，然后自己睡觉'}]},{id:13,text:"买礼物给朋友，你会",options:[{race:"beast",text:"挑了十样都觉得不错，最后买了三样，让朋友自己选"},{race:"mer",text:"送实用的、有纪念意义的"},{race:"dwarf",text:"根据对方的需求精确购买，确保礼物被用到，不浪费"},{race:"human",text:"看到什么买什么，或者干脆发红包，省事"}]},{id:14,text:"遇到街头问卷调查",options:[{race:"beast",text:"不好意思拒绝，填了十分钟，最后买了对方推销的产品"},{race:"ghost",text:'摆手说"没时间"，径直走过，不留余地'},{race:"dwarf",text:'如果感兴趣就认真填，不感兴趣就直接说"不填"，不浪费彼此时间'},{race:"human",text:"看心情，有时候填有时候不填，看对方态度"}]},{id:15,text:"睡前最后一件事通常是",options:[{race:"mer",text:"检查门窗、设定闹钟、把明天要穿的衣服摆好，按部就班"},{race:"ghost",text:"调暗灯光，点香薰，做十分钟冥想，然后关机睡觉"},{race:"dwarf",text:"回顾今天完成的事项，在清单上打勾，规划明天任务"},{race:"human",text:"刷手机刷到睡着，或者突然想起来某件事然后爬起来做"}]},{id:16,text:"选择餐厅座位，你偏好",options:[{race:"elf",text:"靠窗、视野开阔、能看到外面风景的位置"},{race:"beast",text:"方便移动的中间区域，来来回回走动方便"},{race:"mer",text:"靠墙、有安全感、熟悉的位置，如果常去就固定坐同一个"},{race:"ghost",text:"角落、安静、不被打扰，最好背靠墙面对入口"}]},{id:17,text:"面对即将到来的 deadline",options:[{race:"elf",text:"提前完成但不断修改完善，最后一刻还在调整细节"},{race:"beast",text:"时间还早……还早……还早……最后三天通宵，边做边骂自己"},{race:"dwarf",text:"倒排工期，每天完成固定进度，提前三天交付，留缓冲时间"},{race:"human",text:"deadline？什么玩意……我去！最后只能交出半成品，并且做好了挨骂的充分准备"}]},{id:18,text:"老朋友突然联系你，你会",options:[{race:"mer",text:'热情回应，聊起往事，但心里感觉"TA 是不是有事找我"'},{race:"ghost",text:"礼貌回复，但保持边界，不立刻深聊，看对方意图"},{race:"dwarf",text:'直接问"有什么事吗？"，高效沟通，不绕弯子'},{race:"human",text:"开心聊天，约饭约酒，像以前一样"}]}];function D0(v){const U=[...v];for(let A=U.length-1;A>0;A--){const r=Math.floor(Math.random()*(A+1));[U[A],U[r]]=[U[r],U[A]]}return U}const ph={race:"none",text:"都不符合/其他"};function N0(){return D0(bh).map(U=>{const A=[...D0(U.options),ph];return{...U,options:A}})}N0();const Xn={pure_elf:"你在另一个世界的种族是：阿莎娜。细长的尖耳朵是你们一族的基本特征，在接受了赐福后你获得了翱翔于天空的权力。",pure_beast:"你在另一个世界的种族是：玛瑞维。你们天生拥有形状各异的兽瞳，当然具体是什么取决于你们的父母。而在获得赐福后你们会有额外的兽耳，有些还会有对应的角，以及一条毛茸茸的尾巴。",pure_ghost:"你在另一个世界的种族是：迪门特。你的瞳孔拥有优秀的形变能力，这让你的夜视能力比其他人强很多。在进行赐福仪式后你们的额头就会长出对称的双角和一根细长灵活的恶魔尾。",pure_mer:"你在另一个世界的种族是：蒙佩洛。这个种族生来就不用担心在水中窒息，在经历赐福仪式后你的耳朵将会变成鱼鳍状，同时你的双腿可以在水中和陆地上自由切换更合适的形态。",pure_dwarf:"你在另一个世界的种族是：多瑞斯。虽然你长成高个的几率变得非常微小，但通过仪式获得赐福后，你将会获得常人难以企及的怪力，还可以根据自己的心意让你的皮肤金属化，从而获得更强的防御和抗热能力。",pure_human:"你在另一个世界的种族是：伊亚迪克。标准的人类，当然，你也可以自称自己是最古老的，最标准的人种，虽然你没有各种额外的外貌特征，但你也不用额外修改你的衣服和家具去适应那些翅膀和尾巴。",dual_elf_beast_elf:"你在另一个世界的种族是：混血阿莎娜。你的尖耳比纯血阿莎娜短一点，你的兽瞳比纯血玛瑞维圆一点。而你选择接受了属于阿莎娜的赐福仪式：你背后的翅膀因为玛瑞维血脉的影响，原本该是膜翅的部分变成了鸟一样的羽翼，你起飞时会需要更多的力量，但你在长距离飞行上的优势也变得巨大。",dual_elf_beast_beast:"你在另一个世界的种族是：混血玛瑞维。你的尖耳比纯血阿莎娜短一点，你的兽瞳比纯血玛瑞维圆一点。而你选择接受了属于玛瑞维的赐福仪式：你本该获得的兽耳因为混血的原因变成了覆盖细羽的耳羽，身后的尾巴也成了羽尾。你拥有鸟类轻盈的体态和更敏锐的听觉，只是冬天保暖时可能需要一顶更厚的帽子。",dual_elf_mer_elf:"你在另一个世界的种族是：混血阿莎娜。你的尖耳比纯血阿莎娜短一点，并且天生拥有在水中呼吸的权力。而你选择接受了属于阿莎娜的赐福仪式：你背后的翅膀变成了飞鱼翅，薄膜上带着细密的鳞片纹理。在飞行时你翅膀降下的阴影如同透过了海面波光粼粼。",dual_elf_mer_mer:"你在另一个世界的种族是：混血蒙佩洛。你在水中可以像在陆地上自在地呼吸，你的耳廓比纯血蒙佩洛更尖一点，带着精灵族特有的棱角。而你选择接受了属于蒙佩洛的赐福仪式：你获得的尾巴细长而半透明，像一条飘逸华丽的丝带。可惜上岸后就会变回双腿的你不能在岸上欣赏它的美丽。",dual_elf_ghost_elf:"你在另一个世界的种族是：混血阿莎娜。你的尖耳比纯血阿莎娜短一点，在黑暗中只要有一丝丝的亮光你就能看清周围。而你选择接受了属于阿莎娜的赐福仪式：你背后的翅膀变成了蝠翼，骨架棱角分明，膜翼上带着暗色的纹路。",dual_elf_ghost_ghost:"你在另一个世界的种族是：混血迪门特。你的尖耳比纯血阿莎娜短一点，瞳孔会在黑暗的环境中为了聚光而变得细长。而你选择接受了属于迪门特的赐福仪式：你长出的双角颜色浅淡且不对称，像是被精灵的血统轻轻掰弯了生长方向。并且你本因获得的尾巴也没有出现，至少这让你坐下时比其他纯血同族自由许多。",dual_elf_dwarf_elf:"你在另一个世界的种族是：混血阿莎娜。你的尖耳比纯血阿莎娜钝一点，身材也比纯血阿莎娜娇小不少。而你选择接受了属于阿莎娜的赐福仪式：你的双臂外侧生出了翅膀，展开时像一件华丽的披风。你无法像纯血阿莎娜那样只靠背部发力，比起飞行你更像是在滑翔，稍加锻炼的话，你还可以学会如何一边飞行一边稳稳地握住工具。",dual_elf_dwarf_dwarf:"你在另一个世界的种族是：混血多瑞斯。你的身高比多数多瑞斯稍高一点，但耳尖的弧度展示着你另一半的阿莎娜血统。而你选择接受了属于多瑞斯的赐福仪式：你的皮肤无法像纯血同族变成金属，而是呈现出琉璃般的光泽，在阳光下微微透光。虽你没有获得纯血多瑞斯那样的怪力，但你的皮肤在琉璃化时对高温的耐受依旧出色，而且琉璃的质感让你在创作时看起来也是精美的工艺品的一员。",dual_beast_mer_beast:"你在另一个世界的种族是：混血玛瑞维。你的兽瞳比纯血玛瑞维稍圆一点，天生就能在陆地和海洋中自在地呼吸。而你选择接受了属于玛瑞维的赐福仪式：你并没有获得你的兽耳，但你获得了一条鱼类尾巴，和蒙佩洛的尾巴不同，它并没有取代你的双腿，而是与它们共存。你在水中摆尾游动的速度不输纯血蒙佩洛，上岸后尾巴不会消失，而是会自然垂在身后，成为你独特的第三条支撑。",dual_beast_mer_mer:"你在另一个世界的种族是：混血蒙佩洛。在水中你不会窒息，而你的兽瞳在深海中别具一格。你选择接受了属于蒙佩洛的赐福仪式：你双腿幻化而成的尾巴宽大而厚重，像鲸鱼一样充满力量。你在深海中的巡游稳定而持久，不用担心尾巴的重量会影响你在陆地上的移动，蒙佩洛的尾巴一般上岸后就能切换成更方便的双腿。",dual_beast_ghost_beast:"你在另一个世界的种族是：混血玛瑞维。你的兽瞳在黑暗中会为了适应光线而变细。你选择接受了属于玛瑞维的赐福仪式：你的兽耳没有出现，取而代之的是你的皮肤某些部分出现了细小的鳞片纹理，尾巴也没有毛茸茸的触感，而是更接近蛇类或者某种蜥蜴的鳞片尾巴。",dual_beast_ghost_ghost:"你在另一个世界的种族是：混血迪门特。你的兽瞳会在昏暗的环境中变得细长。你选择接受了属于迪门特的赐福仪式：你的额头上长出了奇数只角——可能是一只独角，也可能是左一只右两只的三角，总之不是双数。你的尾巴和纯血迪门特一样细长灵活，甚至尾尖还有软毛，像个小狮子。你在镜子前可能需要找好角度，但你的角让你看起来相当个性。",dual_beast_dwarf_beast:"你在另一个世界的种族是：混血玛瑞维。你的兽瞳比纯血玛瑞维稍圆一点，身材也比纯血玛瑞维矮小结实。而你选择接受了属于玛瑞维的赐福仪式：你的下半身完全兽化，宛若传说中的半人马或者小鹿女。你估计要适应从双腿变成四腿后该如何重新行走。你失去了纯血玛瑞维那种近似人类的形态，但你被赋予强大的奔跑和跳跃能力，以及更高的视野，只是买裤子时需要特别定制。",dual_beast_dwarf_dwarf:"你在另一个世界的种族是：混血多瑞斯。你的身材比纯血玛瑞维稍矮一点，兽瞳在黑暗中发出微光。而你选择接受了属于多瑞斯的赐福仪式：你的皮肤在金属化时和纯血多瑞斯不同，呈现出的是那种青铜色的金属光泽，但你的怪力和纯血相差无几。",dual_mer_ghost_mer:"你在另一个世界的种族是：混血蒙佩洛。你在潜入深海时能更快适应黑暗的环境。而你选择接受了属于蒙佩洛的赐福仪式：你获得的尾巴像海蛇一样，修长而有力，在水中的游动姿态带着一种诡异的优雅，但尾巴的长度让你在浅水中转身时需要比别人多预留一点空间，不过上岸后就可以变回双腿轻松移动了。",dual_mer_ghost_ghost:"你在另一个世界的种族是：混血迪门特。你的眼睛在黑暗中会变成如同捕食者一样的竖瞳，并且你天生就可以在水中畅快地呼吸。你选择接受了属于迪门特的赐福仪式：你长出的角是半透明的，在阳光的照耀下格外美丽，不过这对角左右不完全对称，希望你没有强迫症，不然每一次照镜子都是折磨。你的尾巴和纯血迪门特一样细长而又灵活，尽显优雅。",dual_mer_dwarf_mer:'你在另一个世界的种族是：混血蒙佩洛。你的身材比纯血蒙佩洛稍矮一点，但水下呼吸的能力和其他蒙佩洛一样。在你选择接受了属于蒙佩洛的赐福仪式后：你获得的尾巴上伴生着一些金属结晶，好消息是基本不会影响你的游泳速度，你的尾巴远看就像是移动的小珊瑚。你在水中休息时可能得额外注意一下尾巴的犄角旮旯里有没有藏着什么东西，当然你也可以直接上岸，变回双腿的瞬间那些"意外访客"自然会全部脱落。',dual_mer_dwarf_dwarf:"你在另一个世界的种族是：混血多瑞斯。你的身材比纯血蒙佩洛稍矮一点，并且在水下能够自然而然地呼吸。你选择接受了属于多瑞斯的赐福仪式：你的皮肤可以在你的意念操控下呈现出玛瑙般的纹理和色泽，温润而有光泽。可惜你没有获得纯血多瑞斯那样的怪力。",dual_ghost_dwarf_ghost:"你在另一个世界的种族是：混血迪门特。你的身材比纯血迪门特矮小结实，你的眼睛在黑暗中会像猫一样变得竖长。而你选择接受了属于迪门特的赐福仪式：你的额头中央只长出了一只独角，除此之外别无其它。至少你坐下时再也不用为尾巴找位置了。",dual_ghost_dwarf_dwarf:"你在另一个世界的种族是：混血多瑞斯。你的身材比纯血迪门特稍矮一点，但夜视能力依旧优秀。你选择接受了属于多瑞斯的赐福仪式：你的皮肤可以在你的一念之间呈现出如水晶般的透明质感，并且获得远超常人的怪力。",dual_elf_human_elf:"你在另一个世界的种族是：混血阿莎娜。你拥有阿莎娜标志性的尖耳，只是比纯血同族短了那么一点点。而你选择接受了属于阿莎娜的赐福后，你获得了一对翅膀：只是这对翅膀比纯血同族小了好几圈，展开时更像是一件装饰性的披风，虽然也能飞，但更多时候你是在低空滑翔，或者干脆当成一件会扑腾的防晒外套。",dual_beast_human_beast:"你在另一个世界的种族是：混血玛瑞维。你拥有玛瑞维独特的兽瞳，在选择接受了属于玛瑞维的赐福后，你获得了一对兽耳，但身后并没有那条毛茸茸的尾巴，至少你的裤子不用重新买一批了。",dual_mer_human_mer:"你在另一个世界的种族是：混血蒙佩洛。你天生就能在水中自在呼吸，在你选择接受了属于蒙佩洛的赐福后，你获得了一对鱼鳍状的耳朵，但没有同族一样可以在海洋与陆地间自由切换的鱼尾，你得老老实实学习如何去蛙泳或者自由泳的姿势，不过至少你不用担心换气问题。",dual_ghost_human_ghost:"你在另一个世界的种族是：混血迪门特。你拥有和所有迪门特一样优秀的夜视能力，但你在通过仪式获得赐福时，却只有一根细长灵活的尾巴，并没有获得额上的双角，不过因此你可以考虑的发型可比其他同族多多了。",dual_dwarf_human_dwarf:"你在另一个世界的种族是：混血多瑞斯。你拥有多瑞斯那比常人稍矮小的结实身材而你选择接受了属于多瑞斯的赐福后，你获得了怪力：力气确实比普通人大了不少，搬水桶、和拿起一杯水对你来说没有什么区别，你的皮肤依然是普通的肉色，，皮肤并不会在念头转动下发生变化。受伤时会流血，被烫到会起泡——总之，你算一个力气很大的普通人。",tri_elf_beast_mer_elf:"你在另一个世界的种族是：混血阿莎娜。你同时拥有阿莎娜标志性的尖耳，玛瑞维独特的兽瞳，和蒙佩洛能在水下呼吸的本领，你在选择接受阿莎娜的赐福后，你进一步获得了一对特殊的翅膀：半透明的羽翅，在光线下如同琉璃般折射出柔和的色彩，每一次扇动都像是把空气变成了流动的光。",tri_elf_beast_mer_beast:"你在另一个世界的种族是：混血玛瑞维。你同时拥有阿莎娜标志性的尖耳，玛瑞维独特的兽瞳，和蒙佩洛能在水下呼吸的本领，你在选择接受玛瑞维的赐福后，你进一步获得了一条特殊的尾巴：不似任何已知的生物，非常的华丽夸张，尾羽或尾毛层层叠叠，在水中飘动时如同盛开的羽扇，在陆地上时则需要格外注意别扫到路边的花盆。",tri_elf_beast_mer_mer:"你在另一个世界的种族是：混血蒙佩洛。你同时拥有阿莎娜标志性的尖耳，玛瑞维独特的兽瞳，和蒙佩洛能在水下呼吸的本领，你在选择接受蒙佩洛的赐福后，你进一步获得了一条特殊的尾巴：形状类似于鲸鱼，但外表却晶莹剔透，在水中游动时如同一块流动的宝石，上岸后则可以变回双腿。",tri_elf_beast_ghost_elf:"你在另一个世界的种族是：混血阿莎娜。你同时拥有阿莎娜标志性的尖耳，玛瑞维独特的兽瞳，和迪门特优秀的夜视能力，你在选择接受阿莎娜的赐福后，你进一步获得了一对特殊的翅膀：蝙蝠般的翅膀，翅膀根部毛茸茸的，帅气中又透露着几分可爱。",tri_elf_beast_ghost_beast:"你在另一个世界的种族是：混血玛瑞维。你同时拥有阿莎娜标志性的尖耳，玛瑞维独特的兽瞳，和迪门特优秀的夜视能力，你在选择接受玛瑞维的赐福后，你进一步获得了一条特殊的尾巴：爬行类尾巴，手脚还可能带有额外的鳞片特征，你看起来像是刚从神话故事里爬出来的生物，只是冬天手脚的鳞片可能会让你多涂几层护手霜。",tri_elf_beast_ghost_ghost:"你在另一个世界的种族是：混血迪门特。你同时拥有阿莎娜标志性的尖耳，玛瑞维独特的兽瞳，和迪门特优秀的夜视能力，你在选择接受迪门特的赐福后，你进一步获得了特殊的赐福特征：额头上长出浅色的奇数角，身后还有一条恶魔尾。你的角颜色浅淡，在暗处几乎像是用月光雕刻而成，尾巴则灵活得可以替你捡起掉在桌下的笔。",tri_elf_beast_dwarf_elf:"你在另一个世界的种族是：混血阿莎娜。你同时拥有阿莎娜标志性的尖耳，玛瑞维独特的兽瞳，和多瑞斯那比常人稍矮小的结实身材，你在选择接受阿莎娜的赐福后，你进一步获得了特殊的翅膀：你的手臂变成了羽毛翅膀，展开时像一件华丽的羽衣，好消息是你的手指没有变成飞羽，只是拿东西时需要先把翅膀收拢。",tri_elf_beast_dwarf_beast:"你在另一个世界的种族是：混血玛瑞维。你同时拥有阿莎娜标志性的尖耳，玛瑞维独特的兽瞳，和多瑞斯那比常人稍矮小的结实身材，你在选择接受玛瑞维的赐福后，你进一步获得了特殊的赐福特征：身体某些部分被覆盖上羽毛，双脚变成了修长的鸟爪，以及帮助你调整平衡的鸟尾，你的速度在这些新变化后变得更快了，只是买鞋时需要找特制的开口款，或者干脆放弃穿鞋。",tri_elf_beast_dwarf_dwarf:"你在另一个世界的种族是：混血多瑞斯。你同时拥有阿莎娜标志性的尖耳，玛瑞维独特的兽瞳，和多瑞斯比常人稍矮小的结实身材，你在选择接受多瑞斯的赐福后，你进一步获得了特殊的赐福特征：皮肤在你的意念操控下会呈现出金琉璃化的光泽，在阳光下像一尊会移动的古董花瓶，你获得了半怪力，力气虽然不及纯血多瑞斯的水准，但在正常人中间已经能称得上是大力士了。",tri_elf_mer_ghost_elf:"你在另一个世界的种族是：混血阿莎娜。你同时拥有阿莎娜标志性的尖耳，蒙佩洛能在水下呼吸的本领，和迪门特优秀的夜视能力，你在选择接受阿莎娜的赐福后，你进一步获得了一对特殊的翅膀：半透明的蝠翼，翼膜薄如蝉翼，在月光下会泛出幽微的光，飞行时安静得像是幽灵在滑翔。",tri_elf_mer_ghost_mer:"你在另一个世界的种族是：混血蒙佩洛。你同时拥有阿莎娜标志性的尖耳，蒙佩洛能在水下呼吸的本领，和迪门特优秀的夜视能力，你在选择接受蒙佩洛的赐福后，你进一步获得了一条特殊的尾巴：海蛇类样式的尾巴，但格外的修长，上面覆盖着细密晶莹的鳞片，在水中游动时像一道流动的光带，上岸后可以变回双腿，不然你几米长的尾巴在陆地上移动可称不上方便。",tri_elf_mer_ghost_ghost:"你在另一个世界的种族是：混血迪门特。你同时拥有阿莎娜标志性的尖耳，蒙佩洛能在水下呼吸的本领，和迪门特优秀的夜视能力，你在选择接受迪门特的赐福后，你进一步获得了特殊的赐福特征：半透明的浅色不对称恶魔角，还有一条恶魔尾。你的角左右不对称，配合你细长灵活的尾巴随着你的心情摆动，显得格外有个性。",tri_elf_mer_dwarf_elf:"你在另一个世界的种族是：混血阿莎娜。你同时拥有阿莎娜标志性的尖耳，蒙佩洛能在水下呼吸的本领，和多瑞斯比常人稍矮小的结实身材，你在选择接受阿莎娜的赐福后，你进一步获得了特殊的翅膀：靠近腰侧部位长出了类似飞鱼结构的翅膀，飞翔能力较弱，更像是滑翔用的鳍，从高处跃下时能滑行一段距离，低空飞行时则需要拼命扑腾，看起来像一只努力的小飞鱼。",tri_elf_mer_dwarf_mer:'你在另一个世界的种族是：混血蒙佩洛。你同时拥有阿莎娜标志性的尖耳，蒙佩洛能在水下呼吸的本领，和多瑞斯比常人稍矮小的结实身材，你在选择接受蒙佩洛的赐福后，你进一步获得了一条特殊的尾巴：你本该流线型的鱼尾上生长着一些形状不规则的琉璃晶体，在水中摆动时像一串会移动的风铃，上岸变回双腿后你可能会发现一些刚才被你鱼尾"绑架"的倒霉蛋跟着你来到了岸上，现在才解脱。',tri_elf_mer_dwarf_dwarf:"你在另一个世界的种族是：混血多瑞斯。你同时拥有阿莎娜标志性的尖耳，蒙佩洛能在水下呼吸的本领，和多瑞斯比常人稍矮小的结实身材，你在选择接受多瑞斯的赐福后，你进一步获得了特殊的赐福特征：你没有获得怪力，但皮肤可以在意念变化下呈现出琥珀化的色泽，温润而半透明，像是被时间封存的树脂，在阳光下能看到皮肤下细微的纹理。",tri_elf_ghost_dwarf_elf:"你在另一个世界的种族是：混血阿莎娜。你同时拥有阿莎娜标志性的尖耳，迪门特在黑暗中优秀的夜视能力，和多瑞斯比常人稍矮小的结实身材，你在选择接受阿莎娜的赐福后，你进一步获得了特殊的翅膀：手臂与躯干之间形成了滑翔膜，平时可以收起，展开时像一件贴身的披风，从高处跃下能滑行很远，只是展开时外套 个世界的种族是：混血蒙佩洛。你同时拥有蒙佩洛能在水下呼吸的本领，迪门特优秀的夜视能力，和多瑞斯比常人稍矮小的结实身材，你在选择接受蒙佩洛的赐福后，你进一步获得了一条特殊的尾巴：海蛇尾，鳞片的硬度和光泽和金属一般无二，仿佛自带了一层尾巴铠甲，在水中游动时只要有一点点光就会海底的"明星"，上岸后可以变回双腿。',tri_mer_ghost_dwarf_ghost:"你在另一个世界的种族是：混血迪门特。你同时拥有蒙佩洛能在水下呼吸的本领，迪门特黑暗中优秀的夜视能力，和多瑞斯比常人稍矮小的结实身材，你在选择接受迪门特的赐福后，你进一步获得了特殊的赐福特征：半透明的独角，还有一条恶魔尾。你的角在黑暗中几乎隐形，但被阳光照射时就会折射出微弱的光芒，尾巴则是和纯血一样的灵活，可以帮你拿取一些零散的小物件。",tri_mer_ghost_dwarf_dwarf:"你在另一个世界的种族是：混血多瑞斯。你同时拥有蒙佩洛能在水下呼吸的本领，迪门特优秀的夜视能力，和多瑞斯比常人稍矮小的结实身材，你在选择接受多瑞斯的赐福后，你进一步获得了特殊的赐福特征：半怪力，皮肤会在你的意念催动下呈现出低透宝石类的质感，像磨砂的宝石，不透光但温润，你的力气会比普通人大但还没达到纯血水准。",tri_elf_beast_human_elf:"你在另一个世界的种族是：混血阿莎娜。你同时拥有阿莎娜标志性的尖耳和玛瑞维独特的兽瞳，只是尖耳比纯血短了一点。而你选择接受了属于阿莎娜的赐福后，你获得了一对特殊的翅膀：本该几乎和你身高两倍长的翅膀缩水了不少，像是幼雏的翅膀一样。好消息是你收起翅膀时，别人只会以为你穿了一件奇怪的毛绒外套。",tri_elf_beast_human_beast:"你在另一个世界的种族是：混血玛瑞维。你同时拥有阿莎娜标志性的尖耳和玛瑞维独特的兽瞳，尖耳比纯血短，兽瞳比纯血圆。而你选择接受了属于玛瑞维的赐福后，你获得了特殊的赐福特征：一对覆盖细羽的耳羽和一条羽尾，但耳羽的毛量明显不如同族蓬松，羽尾也更短像是一把小羽扇。冬天耳朵会有点冷，但至少你拥有了玛瑞维标志性的毛绒触感。",tri_elf_mer_human_elf:"你在另一个世界的种族是：混血阿莎娜。你同时拥有阿莎娜标志性的尖耳和蒙佩洛能在水下呼吸的本领，尖耳比纯血稍短。而你选择接受了属于阿莎娜的赐福后，你获得了一对特殊的翅膀：类似飞鱼的鳍翅，但尺寸比混血同族更小，薄膜上的鳞片也黯淡了一些。从高处跳下时能滑行一小段，想真正飞起来得等一阵合适的风。",tri_elf_mer_human_mer:"你在另一个世界的种族是：混血蒙佩洛。你同时拥有阿莎娜标志性的尖耳和蒙佩洛能在水下呼吸的本领，在你选择接受了属于蒙佩洛的赐福后，你获得了一条特殊的尾巴：细长而半透明，像一条飘逸的丝带，但长度比混血同族短了一截，不过不影响你游泳的速度。上岸后变回双腿需要多花几秒，这几秒内你尴尬地趴在岸边等待。",tri_elf_ghost_human_elf:"你在另一个世界的种族是：混血阿莎娜。你同时拥有阿莎娜标志性的尖耳和迪门特优秀的夜视能力。你选择接受了属于阿莎娜的赐福后，你获得了一对特殊的翅膀：半透明的蝠翼，但翼膜比混血同族更薄，骨架也更纤细。夜间飞行时安静依旧，但承受不住太大的风，不是会破裂，而是是可能得被迫改变目的地了。",tri_elf_ghost_human_ghost:"你在另一个世界的种族是：混血迪门特。你同时拥有阿莎娜标志性的尖耳和迪门特优秀的夜视能力，尖耳比纯血短，瞳孔在黑暗中细长。而你选择接受了属于迪门特的赐福后，你获得了特殊的赐福特征：额头上长出了颜色浅淡且不对称的角，但尾巴并没有出现。你的角比同族更小更钝，更像是两个小鼓包，几乎不影响你未来的发型选择，只要刘海多留点盖住角，你看起来就行没被赐福过一样。",tri_elf_dwarf_human_elf:"你在另一个世界的种族是：混血阿莎娜。你同时拥有阿莎娜标志性的尖耳和多瑞斯那比常人稍矮小的结实身材，尖耳比纯血钝了一点。而你选择接受了属于阿莎娜的赐福后，你获得了特殊的翅膀：手臂外侧生出了翅膀，但体型比同族小了一圈，展开时更像一件的披风。滑翔距离大打折扣，而且因为伊亚迪克的血统，你的手臂力量一般，飞久了胳膊会酸。",tri_elf_dwarf_human_dwarf:"你在另一个世界的种族是：混血多瑞斯。你同时拥有阿莎娜标志性的尖耳和多瑞斯那比常人稍矮小的结实身材，在你选择接受了属于多瑞斯的赐福后，你获得了特殊的赐福特征：你的皮肤会在你意念催动下呈现出琉璃般的光泽，但透光度比混血同族差了不少，更像是磨砂玻璃而不是水晶。你没有获得怪力，力气和普通人差不多，但至少在阳光下你依然像一件会移动的工艺品——只是工艺稍微粗糙了一点。",tri_beast_mer_human_beast:"你在另一个世界的种族是：混血玛瑞维。你同时拥有玛瑞维独特的兽瞳和蒙佩洛能在水下呼吸的本领，兽瞳比纯血圆一点。而你选择接受了属于玛瑞维的赐福后，你获得了一条特殊的尾巴：鱼类尾巴与双腿共存，但尾巴比混血同族短了一些。看起来有些不伦不类，至少不用担心转身的时候尾巴一扫一大片。",tri_beast_mer_human_mer:"你在另一个世界的种族是：混血蒙佩洛。你同时拥有玛瑞维独特的兽瞳和蒙佩洛能在水下呼吸的本领，兽瞳在深海中别具一格。而你选择接受了属于蒙佩洛的赐福后，你获得了一条特殊的尾巴：类似鲸鱼或海豚的尾巴，但长度比混血同族短了不少，力量也弱了一些。好消息是在水中巡游还算稳定，上岸变回双腿时和其他同族的瞬间切换不一样，需要多等一会儿，那几秒足够让你怀疑人生。",tri_beast_ghost_human_beast:"你在另一个世界的种族是：混血玛瑞维。你同时拥有玛瑞维独特的兽瞳和迪门特优秀的夜视能力，兽瞳在黑暗中会为了适应光线而变细。而你选择接受了属于玛瑞维的赐福后，你获得了特殊的赐福特征：皮肤某些部分出现了细小的鳞片纹理，获得的鳞尾也更短，站直时尾巴尖都碰不到地。",tri_beast_ghost_human_ghost:"你在另一个世界的种族是：混血迪门特。你同时拥有玛瑞维独特的兽瞳和迪门特优秀的夜视能力，兽瞳在昏暗环境中变得细长。而你选择接受了属于迪门特的赐福后，你获得了特殊的赐福特征：额头上长出了一只小小的独角，尺寸比混血同族缩水了一圈，身后的恶魔尾倒是细长灵活，还因为玛瑞维的血脉尾巴末端有些许绒毛。你在镜子前找角度时，那只小角可能会让你看起来像独角兽幼崽，而不是霸气的恶魔贵族。",tri_beast_dwarf_human_beast:"你在另一个世界的种族是：混血玛瑞维。你同时拥有玛瑞维独特的兽瞳和多瑞斯那比常人稍矮小的结实身材，兽瞳比纯血圆一点。而你选择接受了属于玛瑞维的赐福后，你获得了特殊的赐福特征：下半身兽化，但比混血同族更接近人类——你的双腿变成了强健的兽足，但膝盖往上还保留着人类的轮廓。奔跑和跳跃能力确实增强了，但买裤子时你需要找那种裤腿宽松、腰部正常的特殊款式，买鞋子更是需要特别定制，或者干脆不穿。",tri_beast_dwarf_human_dwarf:'你在另一个世界的种族是：混血多瑞斯。你同时拥有玛瑞维独特的兽瞳和多瑞斯那比常人稍矮小的结实身材，兽瞳在黑暗中发出微光。而你选择接受了属于多瑞斯的赐福后，你获得了特殊的赐福特征：皮肤会在你的一念之间呈现出青铜色的金属光泽，你的力气确实比普通人大了不少，但离"多瑞斯大力士"还有一段距离。',tri_mer_ghost_human_mer:"你在另一个世界的种族是：混血蒙佩洛。你同时拥有蒙佩洛能在水下呼吸的本领和迪门特优秀的夜视能力，在深海中能更快适应黑暗。而你选择接受了属于蒙佩洛的赐福后，你获得了一条特殊的尾巴：海蛇一样的尾巴，但长度比混血同族短了一截，力量也弱了一些。不过在水中游动时依旧灵活，在上岸是变回双腿的时间比别人更长。",tri_mer_ghost_human_ghost:"你在另一个世界的种族是：混血迪门特。你同时拥有蒙佩洛能在水下呼吸的本领和迪门特优秀的夜视能力，眼睛在黑暗中会变成竖瞳。而你选择接受了属于迪门特的赐福后，你获得了特殊的赐福特征：半透明的角，但比混血同族更小，不对称的程度也更夸张——可能只有一只角，或者两只角大小悬殊。恶魔尾倒是细长灵活，但尾尖的鳞片光泽暗淡了一些。你在阳光下依然美丽，只是照镜子前要确保自己没有强迫症。",tri_mer_dwarf_human_mer:"你在另一个世界的种族是：混血蒙佩洛。你天生拥有水下呼吸的能力，也因为父母的血脉在身高上比别人矮一点点，在获得属于蒙佩洛的赐福后，你得到了一条特殊的鱼尾：上面零散的分布着一些不规则的金属结晶，会在太阳光的反射下变的格外瞩目，但你无论是上岸还是下水需要更多时间切换自己双腿的形态。",tri_mer_dwarf_human_dwarf:"你在另一个世界的种族是：混血多瑞斯。你同时拥有蒙佩洛能在水下呼吸的本领和多瑞斯那比常人稍矮小的结实身材，在水下能够自然而然地呼吸。而你选择接受了属于多瑞斯的赐福后，你获得了特殊的赐福特征：皮肤可以在意念操控下呈现出玛瑙般的纹理和色泽，但温润度比混血同族差了一些，更像是抛光的石头而不是宝石。你没有获得怪力，力气和普通人差不多。",tri_ghost_dwarf_human_ghost:"你在另一个世界的种族是：混血迪门特。你同时拥有迪门特优秀的夜视能力和多瑞斯那比常人稍矮小的结实身材，眼睛在黑暗中会像猫一样变得竖长。而你选择接受了属于迪门特的赐福后，你获得了特殊的赐福特征：额头中央长出了一只独角，但比混
